name: 房产监控日报

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: 运行监控程序
      env:
        WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
      run: python main.py
